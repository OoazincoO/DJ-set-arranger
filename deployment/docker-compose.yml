version: '3.8'

services:
  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: djset_postgres
    environment:
      POSTGRES_DB: djsetstudio
      POSTGRES_USER: djsetuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - djset_network
    restart: unless-stopped

  # Flask后端
  backend:
    build:
      context: ../djsetstudio-backend
      dockerfile: ../deployment/Dockerfile
    container_name: djset_backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://djsetuser:${DB_PASSWORD:-changeme}@db:5432/djsetstudio
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-key}
      CORS_ORIGINS: "*"
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - djset_network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: djset_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../djsetstudio-web:/var/www/djsetstudio-web:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - djset_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  djset_network:
    driver: bridge
